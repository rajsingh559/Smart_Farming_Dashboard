{% extends 'base.html' %}

{% block title %}{{ title }} - Smart Farming Dashboard{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="row">
    <!-- Reports Content Panel -->
    <div class="col-12">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <!-- Header bar -->
            <div class="card-header bg-white border-0 py-3 px-4 d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="fw-bold mb-0 text-success"><i class="bi bi-cloud-sun"></i> {{ title }}</h5>
                    <p class="text-muted small mb-0">{{ description }}</p>
                </div>
                <button class="btn btn-sm btn-outline-success animate-hover" onclick="document.getElementById('tableau-iframe').src=document.getElementById('tableau-iframe').src;">
                    <i class="bi bi-arrow-clockwise"></i> Refresh Report
                </button>
            </div>
            
            <!-- Embedded iframe with responsive / scrollable container styling -->
            <div class="card-body p-0 border-top bg-light">
                <div class="tableau-container w-100" style="overflow-x: auto; -webkit-overflow-scrolling: touch;">
                    <iframe 
                        id="tableau-iframe"
                        src="{{ dashboard_url }}" 
                        width="100%" 
                        height="900" 
                        style="border: none; min-width: 850px; display: block;" 
                        allowfullscreen="true">
                    </iframe>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
